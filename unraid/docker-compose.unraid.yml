services:
  lavalink:
    image: shuaturner/flash105-lavalink:latest
    container_name: lavalink
    restart: unless-stopped

  discord-music-bot:
    image: shuaturner/flash105:latest
    container_name: discord-music-bot
    restart: unless-stopped
    depends_on:
      - lavalink
    env_file:
      - /mnt/user/appdata/discord-music-bot/bot/.env
