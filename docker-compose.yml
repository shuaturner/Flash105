services:
  lavalink:
    image: ${LAVALINK_IMAGE:-flash105-lavalink:latest}
    build:
      context: .
      dockerfile: Dockerfile.lavalink
    restart: unless-stopped
    expose:
      - "2333"

  discord-music-bot:
    image: ${BOT_IMAGE:-discord-music-bot:latest}
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - lavalink
    restart: unless-stopped
