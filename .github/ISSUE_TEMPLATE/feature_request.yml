name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Include examples, Discord use cases, or Unraid context if helpful.
    validations:
      required: false
