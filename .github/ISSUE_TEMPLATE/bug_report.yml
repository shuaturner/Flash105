name: Bug report
description: Report a problem with the bot, Docker image, or Unraid install
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Include commands, environment, and exact steps.
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local Docker
        - Docker Hub image
        - Unraid
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste bot and/or Lavalink logs here.
      render: text
    validations:
      required: false
